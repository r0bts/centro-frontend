<div class="vh-100 d-flex align-items-center justify-content-center bg-light py-5 px-3">
  <div class="w-100 bg-white p-4 p-md-5 rounded-4 shadow border border-light" style="max-width: 450px;">
    <div>
      <img class="mx-auto d-block" style="height: 6rem; width: auto;" src="assets/logo.png" alt="Centro Libanés" onerror="this.src='https://arzsuite.com/assets/images/logo.png'">
      <h2 class="mt-4 text-center fs-2 fw-bolder text-secondary">
        Portal de Tutores
      </h2>
      <p class="mt-2 text-center text-muted small">
        Gestiona las salidas del Curso de Verano
      </p>
    </div>

    <!-- Paso 1: Teléfono -->
    <div *ngIf="step === 1" class="mt-4">
      <div class="mb-4">
        <label for="phone" class="form-label visually-hidden">Número Celular</label>
        <input id="phone" name="phone" type="tel" [(ngModel)]="phone" required
          class="form-control form-control-lg"
          placeholder="Tu número celular (10 dígitos)">
      </div>

      <div>
        <button (click)="requestOtp()" [disabled]="isLoading"
          class="btn btn-primary w-100 py-2 fw-bold text-white shadow-sm">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ isLoading ? 'Enviando...' : 'Recibir código por WhatsApp' }}
        </button>
      </div>
    </div>

    <!-- Paso 2: OTP -->
    <div *ngIf="step === 2" class="mt-4">
      <p class="small text-center text-muted mb-4">
        Hemos enviado un código a <br><strong class="fs-5 text-dark">{{phone}}</strong>
      </p>
      
      <div class="mb-4">
        <label for="code" class="form-label visually-hidden">Código de 6 dígitos</label>
        <input id="code" name="code" type="text" maxlength="6" [(ngModel)]="code" required
          class="form-control form-control-lg text-center fs-3 fw-bold"
          style="letter-spacing: 0.5em;"
          placeholder="000000">
      </div>

      <div class="mb-3">
        <button (click)="verifyOtp()" [disabled]="isLoading"
          class="btn btn-primary w-100 py-2 fw-bold text-white shadow-sm">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ isLoading ? 'Verificando...' : 'Ingresar al Portal' }}
        </button>
      </div>
      <div class="text-center">
        <button (click)="step = 1" class="btn btn-link text-decoration-none shadow-none text-muted p-0">
          <small>Cambiar número</small>
        </button>
      </div>
    </div>
  </div>
</div>
