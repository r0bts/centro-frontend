<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
    <h5 class="card-title mb-0">
      <i class="bi bi-geo-alt me-2"></i>Áreas y Clubes
    </h5>
    <div class="d-flex gap-2">
      <div class="input-group input-group-sm" style="min-width:220px">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" placeholder="Buscar área..."
          [value]="search()" (input)="search.set($any($event.target).value)">
      </div>
      <button class="btn btn-sm btn-outline-secondary" (click)="loadAreas()" [disabled]="loading()">
        <i class="bi bi-arrow-clockwise" [class.spin]="loading()"></i>
      </button>
    </div>
  </div>

  <div class="card-body p-0">

    <div *ngIf="loading()" class="d-flex justify-content-center align-items-center py-5">
      <div class="spinner-border text-primary me-3"></div>
      <span class="text-muted">Cargando áreas...</span>
    </div>

    <div *ngIf="!loading() && error()" class="alert alert-danger m-3">
      <i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}
    </div>

    <div *ngIf="!loading() && !error()" class="table-responsive">
      <table class="table table-hover table-sm align-middle mb-0">
        <thead class="table-light sticky-top">
          <tr>
            <th class="ps-3" style="min-width:180px">Área</th>
            <th *ngFor="let club of clubes()" class="text-center" style="min-width:140px">
              {{ club.name }}
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let area of filteredAreas; trackBy: trackByArea"
              [class.table-active]="isSaving(area.id)">

            <td class="ps-3 fw-semibold">{{ area.name }}</td>

            <td *ngFor="let club of clubes()" class="text-center">

              <!-- Spinner mientras guarda -->
              <div *ngIf="isSaving(area.id)" class="d-flex justify-content-center">
                <span class="spinner-border spinner-border-sm text-secondary"></span>
              </div>

              <ng-container *ngIf="!isSaving(area.id)">
                <!-- Fila superior: toggle asignación -->
                <div class="mb-1">
                  <button
                    class="btn btn-sm px-2 py-0"
                    [class.btn-success]="hasClub(area, club.id)"
                    [class.btn-outline-secondary]="!hasClub(area, club.id)"
                    (click)="toggleClub(area, club.id)"
                    [title]="hasClub(area, club.id) ? 'Quitar de ' + club.name : 'Asignar a ' + club.name">
                    <i class="bi"
                       [class.bi-check-circle-fill]="hasClub(area, club.id)"
                       [class.bi-circle]="!hasClub(area, club.id)">
                    </i>
                    <span class="ms-1 small">{{ hasClub(area, club.id) ? 'Asignado' : 'Sin asignar' }}</span>
                  </button>
                </div>

                <!-- Fila inferior: botón de plano (solo si el área está asignada al club) -->
                <div *ngIf="hasClub(area, club.id)">
                  <ng-container *ngIf="getLayoutForClub(area, club.id) as lpc">
                    <button
                      *ngIf="lpc.has_layout"
                      class="btn btn-sm btn-primary px-2 py-0"
                      (click)="onOpenEditor(area, club.id)"
                      title="Editar plano">
                      <i class="bi bi-grid-3x3-gap-fill me-1"></i>
                      <span class="small">{{ lpc.filas }}×{{ lpc.columnas }}</span>
                    </button>
                    <button
                      *ngIf="!lpc.has_layout"
                      class="btn btn-sm btn-outline-primary px-2 py-0"
                      (click)="onOpenEditor(area, club.id)"
                      title="Crear plano">
                      <i class="bi bi-plus-lg me-1"></i><span class="small">Crear plano</span>
                    </button>
                  </ng-container>
                  <button
                    *ngIf="!getLayoutForClub(area, club.id)"
                    class="btn btn-sm btn-outline-primary px-2 py-0"
                    (click)="onOpenEditor(area, club.id)"
                    title="Crear plano">
                    <i class="bi bi-plus-lg me-1"></i><span class="small">Crear plano</span>
                  </button>
                </div>
              </ng-container>

            </td>
          </tr>

          <tr *ngIf="filteredAreas.length === 0">
            <td [attr.colspan]="clubes().length + 1" class="text-center text-muted py-4">
              <i class="bi bi-inbox fs-4 d-block mb-2"></i>No se encontraron áreas
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="!loading() && !error()" class="px-3 py-2 border-top bg-light small text-muted">
      {{ filteredAreas.length }} de {{ areas().length }} áreas
    </div>
  </div>
</div>
