<div class="container-fluid bg-light min-vh-100 p-0">
  <app-content-menu></app-content-menu>
  
  <div class="p-4 p-md-5">
    
    <!-- Back button -->
    <button class="btn btn-link text-decoration-none text-muted mb-4 p-0 d-flex align-items-center" (click)="goBack()">
      <i class="bi bi-arrow-left me-2"></i> Volver al Dashboard
    </button>
    
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        
        <!-- ERROR ALERT -->
        <div *ngIf="cameraError" class="alert alert-danger d-flex align-items-center mb-4 flex-column align-items-start" role="alert">
          <div class="d-flex w-100 mb-2">
             <i class="bi bi-exclamation-triangle-fill flex-shrink-0 me-2 fs-4"></i>
             <div>{{ cameraError }}</div>
          </div>
          <button *ngIf="needsPermissionButton" class="btn btn-outline-danger mt-2" (click)="requestCameraPermission()">
             <i class="bi bi-camera-video"></i> Solicitar Acceso a Cámara
          </button>
        </div>
        </div>

        <!-- Tarjeta de Escáner -->
        <div class="card shadow-sm border-0 rounded-4 mb-4" *ngIf="isScanning">
          <div class="card-body p-0 overflow-hidden rounded-4">
            <div id="qr-reader-medical" class="w-100"></div>
          </div>
          <div class="card-footer bg-light text-center py-4">
            <h5 class="fw-bold text-dark mb-2">Escanear Código QR</h5>
            <p class="text-muted mb-4 small">Pasa el código QR por la lectora para buscar el expediente o ingresa el código manualmente.</p>
            
            <form (ngSubmit)="onScan()">
              <div class="input-group input-group-lg shadow-sm rounded-3">
                <span class="input-group-text bg-white border-end-0 text-muted">
                  <i class="bi bi-upc-scan"></i>
                </span>
                <input 
                  #qrInput
                  type="text" 
                  class="form-control border-start-0 ps-0 fs-6" 
                  placeholder="O ingresa el código aquí..."
                  [(ngModel)]="qrToken"
                  name="qrToken"
                  autocomplete="off"
                  autofocus
                  [disabled]="isLoading">
                <button class="btn btn-primary px-4" type="submit" [disabled]="isLoading || !qrToken">
                  Buscar
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- LOADING OVERLAY -->
        <div *ngIf="isLoading" class="card shadow-sm border-0 rounded-4 mb-4 py-5 text-center">
          <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Buscando...</span>
          </div>
          <p class="mt-3 text-muted fw-bold">Buscando expediente...</p>
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger shadow-sm rounded-4 border-0 mb-4 d-flex align-items-center" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-3 fs-4"></i>
          <div>{{ errorMessage }}</div>
        </div>

        <!-- Perfil Médico movido a nueva pantalla de expediente -->

      </div>
    </div>
    
  </div>
</div>
