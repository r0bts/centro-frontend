<div class="topnav-wrapper">
  <nav class="topnav-bar">

    <!-- Pill 1: Marca y Toggler -->
    <div class="topnav-pill topnav-pill--brand">
      <div class="topnav-brand">
        <img src="/assets/images/LOGO_CL.png" alt="Logo CL" class="topnav-logo">
      </div>
      <button class="topnav-toggler" (click)="toggleMobileMenu()" [attr.aria-expanded]="isMobileMenuOpen()">
        <i [class]="isMobileMenuOpen() ? 'bi bi-x-lg' : 'bi bi-list'"></i>
      </button>
    </div>

    <!-- Collapse -->
    <div class="topnav-collapse" [class.open]="isMobileMenuOpen()">

      <!-- Pill 2: Items de navegación -->
      <div class="topnav-pill topnav-pill--nav">
        <ul class="topnav-list" #navList>
          
          <!-- Indicador deslizante -->
          <div class="topnav-active-indicator" [ngStyle]="indicatorStyle()"></div>

          <li class="topnav-item" *ngFor="let item of menuItems()">

          <!-- Item con hijos → dropdown -->
          <div *ngIf="item.children && item.children.length > 0; else simpleNavItem"
               class="topnav-item-dd"
               [class.open]="item.isExpanded">
            <a class="topnav-link"
               [class.active]="isActive(item.id) || hasActiveChild(item)"
               (click)="toggleSubmenu(item, $event)">
              {{ item.label }}
              <i class="bi bi-chevron-down topnav-chevron"></i>
            </a>
            <div class="topnav-dropdown" [class.show]="item.isExpanded">
              <a *ngFor="let child of item.children"
                 class="topnav-dd-item"
                 [class.active]="isActive(child.id)"
                 (click)="onSectionClick(child.id, $event)">
                {{ child.label }}
              </a>
            </div>
          </div>

          <!-- Item simple -->
          <ng-template #simpleNavItem>
            <a class="topnav-link"
               [class.active]="isActive(item.id)"
               (click)="onSectionClick(item.id, $event)">
              {{ item.label }}
            </a>
          </ng-template>

        </li>
        </ul>
      </div>

      <!-- Pill 3: Acciones -->
      <div class="topnav-pill topnav-pill--actions">
        <div class="topnav-actions">

        <!-- Engranaje Configuración -->
        <div class="topnav-gear-wrapper" [class.open]="isGearOpen()" *ngIf="gearItems().length > 0">
          <button class="topnav-action-btn"
                  [class.active]="isGearOpen() || isGearActive()"
                  title="Configuración"
                  (click)="toggleGear($event)">
            <i class="bi bi-gear-fill"></i>
          </button>
          <div class="topnav-dropdown topnav-dropdown--right" [class.show]="isGearOpen()">
            <div class="topnav-dd-header">Configuración</div>
            <a *ngFor="let child of gearItems()"
               class="topnav-dd-item"
               [class.active]="isActive(child.id)"
               (click)="onSectionClick(child.id, $event)">
              <i [class]="'bi ' + child.icon"></i>
              {{ child.label }}
            </a>
          </div>
        </div>

        <!-- Avatar / Perfil -->
        <div class="topnav-avatar-wrapper">
          <div class="topnav-avatar"
               [class.open]="isAvatarOpen()"
               title="Perfil"
               (click)="toggleAvatar($event)">
            {{ userInitial() }}
          </div>
          <div class="topnav-avatar-dropdown" [class.show]="isAvatarOpen()">

            <!-- Cabecera: círculo + nombre + rol -->
            <div class="topnav-avatar-header">
              <div class="topnav-avatar-circle">{{ userInitial() }}</div>
              <div class="topnav-avatar-info">
                <span class="topnav-avatar-name">{{ userDisplayName() }}</span>
                <span class="topnav-avatar-role">{{ userRoleLabel() }}</span>
              </div>
            </div>

            <!-- Datos del usuario -->
            <div class="topnav-avatar-body">
              <div class="topnav-avatar-row" *ngIf="userEmail()">
                <i class="bi bi-envelope"></i>
                <span>{{ userEmail() }}</span>
              </div>
              <div class="topnav-avatar-row" *ngIf="userDepartment()">
                <i class="bi bi-building"></i>
                <span>{{ userDepartment() }}</span>
              </div>
              <div class="topnav-avatar-row" *ngIf="userLocation()">
                <i class="bi bi-geo-alt"></i>
                <span>{{ userLocation() }}</span>
              </div>
              <div class="topnav-avatar-row" *ngIf="userEmployeeNumber()">
                <i class="bi bi-person-badge"></i>
                <span>No. {{ userEmployeeNumber() }}</span>
              </div>
            </div>

            <!-- Logout -->
            <div class="topnav-avatar-footer">
              <button class="topnav-avatar-logout" (click)="onLogout()">
                <i class="bi bi-box-arrow-right"></i>
                Cerrar sesión
              </button>
            </div>

          </div>
        </div>

        </div>
      </div>
    </div><!-- /collapse -->

  </nav>
</div>
