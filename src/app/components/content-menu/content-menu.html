<div class="topnav-wrapper">
  <nav class="topnav-bar">

    <!-- Marca -->
    <div class="topnav-brand">
      <img src="/assets/images/LOGO_CL.png" alt="Logo CL" class="topnav-logo">
    </div>

    <!-- Botón hamburguesa (mobile) -->
    <button class="topnav-toggler" (click)="toggleMobileMenu()" [attr.aria-expanded]="isMobileMenuOpen()">
      <i [class]="isMobileMenuOpen() ? 'bi bi-x-lg' : 'bi bi-list'"></i>
    </button>

    <!-- Collapse -->
    <div class="topnav-collapse" [class.open]="isMobileMenuOpen()">

      <!-- Items de navegación -->
      <ul class="topnav-list">

        <li class="topnav-item" *ngFor="let item of menuItems()">

          <!-- Item con hijos → dropdown -->
          <div *ngIf="item.children && item.children.length > 0; else simpleNavItem"
               class="topnav-item-dd"
               [class.open]="item.isExpanded">
            <a class="topnav-link"
               [class.active]="isActive(item.id) || hasActiveChild(item)"
               (click)="toggleSubmenu(item, $event)">
              {{ item.label }}
              <i class="bi bi-chevron-down topnav-chevron"></i>
            </a>
            <div class="topnav-dropdown" [class.show]="item.isExpanded">
              <a *ngFor="let child of item.children"
                 class="topnav-dd-item"
                 [class.active]="isActive(child.id)"
                 (click)="onSectionClick(child.id, $event)">
                {{ child.label }}
              </a>
            </div>
          </div>

          <!-- Item simple -->
          <ng-template #simpleNavItem>
            <a class="topnav-link"
               [class.active]="isActive(item.id)"
               (click)="onSectionClick(item.id, $event)">
              {{ item.label }}
            </a>
          </ng-template>

        </li>
      </ul>

      <!-- Separador -->
      <div class="topnav-sep"></div>

      <!-- Acciones -->
      <div class="topnav-actions">

        <!-- Campana de Notificaciones -->
        <div class="topnav-notif-wrapper" [class.open]="isNotifOpen()">
          <button class="topnav-action-btn"
                  [class.active]="isNotifOpen()"
                  title="Notificaciones"
                  (click)="toggleNotif($event)">
            <i class="bi bi-bell-fill"></i>
            <span class="notif-badge" *ngIf="notifService.unreadCount() > 0">
              {{ notifService.unreadCount() > 99 ? '99+' : notifService.unreadCount() }}
            </span>
          </button>

          <!-- Panel dropdown de notificaciones -->
          <div class="notif-panel" [class.show]="isNotifOpen()" (click)="$event.stopPropagation()">
            <div class="notif-panel__header">
              <span class="notif-panel__title">Notificaciones</span>
              <button class="notif-panel__mark-all"
                      *ngIf="notifService.unreadCount() > 0"
                      (click)="notifService.markAllRead()">
                Marcar todas como leídas
              </button>
            </div>

            <!-- Lista vacía -->
            <div class="notif-panel__empty" *ngIf="notifService.notifications().length === 0">
              <i class="bi bi-bell-slash"></i>
              <span>Sin notificaciones</span>
            </div>

            <!-- Lista de notificaciones -->
            <div class="notif-panel__list" *ngIf="notifService.notifications().length > 0">
              <div *ngFor="let n of notifService.notifications()"
                   class="notif-item"
                   [class.notif-item--unread]="!n.is_read"
                   (click)="navigateFromNotif(n)"
                   title="Ir a la requisición">
                <!-- Chip de tipo -->
                <span class="notif-item__chip"
                      [style.background]="notifService.chipColor(n.type)">
                  <i [class]="'bi ' + notifService.chipIcon(n.type)"></i>
                  {{ notifService.chipLabel(n.type) }}
                </span>
                <!-- Contenido -->
                <div class="notif-item__content">
                  <p class="notif-item__title">{{ n.title }}</p>
                  <p class="notif-item__body" *ngIf="n.body">{{ n.body }}</p>
                  <span class="notif-item__time">{{ notifService.timeAgo(n.created_at) }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Engranaje Configuración -->
        <div class="topnav-gear-wrapper" [class.open]="isGearOpen()">
          <button class="topnav-action-btn"
                  [class.active]="isGearOpen() || isGearActive()"
                  title="Configuración"
                  (click)="toggleGear($event)">
            <i class="bi bi-gear-fill"></i>
          </button>
          <div class="topnav-dropdown topnav-dropdown--right" [class.show]="isGearOpen()">
            <div class="topnav-dd-header">Configuración</div>
            <a *ngFor="let child of gearItems()"
               class="topnav-dd-item"
               [class.active]="isActive(child.id)"
               (click)="onSectionClick(child.id, $event)">
              <i [class]="'bi ' + child.icon"></i>
              {{ child.label }}
            </a>
          </div>
        </div>

        <!-- Avatar / Perfil -->
        <div class="topnav-avatar" title="Perfil">
          {{ userInitial() }}
        </div>

        <!-- Logout -->
        <button class="topnav-action-btn topnav-action-btn--logout"
                title="Cerrar sesión"
                (click)="onLogout()">
          <i class="bi bi-box-arrow-right"></i>
        </button>

      </div>
    </div><!-- /collapse -->

  </nav>
</div>
